[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "devicedeck"
version = "0.1.0"
description = "Desktop workspace for Android debugging: ADB files, terminal sessions, and scrcpy screen control."
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
authors = [{ name = "DeviceDeck contributors" }]
keywords = ["android", "adb", "scrcpy", "pyqt5", "sftp", "desktop"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Environment :: X11 Applications :: Qt",
  "Environment :: Win32 (MS Windows)",
  "Intended Audience :: Developers",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Testing",
]
dependencies = [
  "PyQt5>=5.15.11,<6.0",
  "pyserial>=3.5,<4.0",
  "paramiko>=3.0,<5.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0"]
build = ["pyinstaller>=6.0,<7.0"]

[project.scripts]
devicedeck = "devicedeck.app:main"

# After publishing, set your repo (optional but recommended for PyPI):
# [project.urls]
# Homepage = "https://github.com/<you>/devicedeck"
# Repository = "https://github.com/<you>/devicedeck"

[tool.setuptools.packages.find]
where = ["."]
include = ["devicedeck*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
