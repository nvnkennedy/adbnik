name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest tests -q

  build-portable:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install build dependencies
        run: pip install -e ".[build]"
      - name: Build portable bundle
        run: powershell -ExecutionPolicy Bypass -File scripts/build_windows_exe.ps1
      - name: Package portable zip
        run: |
          powershell -Command "Compress-Archive -Path dist/Adbnik/* -DestinationPath Adbnik_Portable_${{ github.ref_name }}.zip -Force"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: portable-bundle
          path: Adbnik_Portable_${{ github.ref_name }}.zip

  release:
    needs: build-portable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: portable-bundle
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Adbnik_Portable_${{ github.ref_name }}.zip
          generate_release_notes: true
