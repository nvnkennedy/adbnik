# Builds unsigned PyInstaller onedir + Inno Setup installer + portable zip (Windows),
# uploads artifacts, and attaches files to the GitHub Release for the tag.
# Requires a tree with adbnik/ and packaging/windows/ — tag commits from branch naveen
# (distribution-only main does not contain the app sources).
name: windows-installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies and PyInstaller bundle
        shell: pwsh
        run: |
          python -m pip install -U pip
          python -m pip install ".[build]"
          python -m PyInstaller packaging/windows/adbnik.spec --noconfirm

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y

      - name: Portable zip + Inno installer
        shell: pwsh
        run: |
          $root = Get-Location
          $ver = (python packaging/windows/read_project_version.py).Trim()
          New-Item -ItemType Directory -Force -Path installers | Out-Null
          Start-Sleep -Seconds 3
          $zipName = "Adbnik-$ver-Windows-portable-unsigned.zip"
          $zipPath = Join-Path $root "installers\$zipName"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          $stage = Join-Path $root "installers\_zip_stage"
          if (Test-Path $stage) { Remove-Item $stage -Recurse -Force -ErrorAction SilentlyContinue }
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item -Path (Join-Path $root "dist\Adbnik\*") -Destination $stage -Recurse -Force
          $zipOk = $false
          for ($attempt = 1; $attempt -le 5; $attempt++) {
            try {
              if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
              Compress-Archive -Path (Join-Path $stage "*") -DestinationPath $zipPath -Force -ErrorAction Stop
              $zipOk = $true
              break
            } catch {
              Write-Warning "Portable zip attempt $attempt failed: $_"
              Start-Sleep -Seconds ($attempt + 2)
            }
          }
          Remove-Item $stage -Recurse -Force -ErrorAction SilentlyContinue
          if (-not $zipOk) { throw "Could not create portable zip after retries." }
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$ver" "packaging\windows\adbnik.iss"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-unsigned-packages
          path: |
            installers/*.exe
            installers/*.zip

      - name: Attach installer and zip to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installers/*.exe
            installers/*.zip
          generate_release_notes: true
