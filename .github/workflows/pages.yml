# GitHub Pages: marketing site (`site/`) + user guide (`docs/guide/`) + styles (`docs/css/`).
# Deploys only from **main** (distribution / website branch). See `site/DEPLOY.md`.
name: pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "docs/guide/**"
      - "docs/css/**"
      - "docs/screenshots/**"
      - "branding/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Fails with "Get Pages site failed" / Not Found until Settings → Pages → Source is GitHub Actions.
      - uses: actions/configure-pages@v5
      - name: Assemble published site (marketing + guide + CSS)
        run: |
          set -e
          mkdir -p publish
          cp -a site/. publish/
          mkdir -p publish/guide publish/css publish/screenshots publish/branding
          cp docs/guide/*.html publish/guide/
          cp docs/css/site.css publish/css/
          cp docs/screenshots/*.png publish/screenshots/
          find branding -maxdepth 1 -type f \( -name '*.png' -o -name '*.ico' \) -exec cp {} publish/branding/ \;
      - uses: actions/upload-pages-artifact@v3
        with:
          path: publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
