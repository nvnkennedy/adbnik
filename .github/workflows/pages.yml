# GitHub Pages: merge marketing site (`site/`) + user guide (`docs/guide/`) + styles (`docs/css/`).
# See site/DEPLOY.md
name: pages

on:
  push:
    branches: [main, naveen]
    paths:
      - "site/**"
      - "docs/guide/**"
      - "docs/css/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Assemble published site (marketing + guide + CSS)
        run: |
          set -e
          mkdir -p publish
          cp -a site/. publish/
          mkdir -p publish/guide publish/css
          cp docs/guide/*.html publish/guide/
          cp docs/css/site.css publish/css/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
